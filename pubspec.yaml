name: campus_flow
description: AI Operating System for Student Life
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Local storage
  shared_preferences: ^2.2.2

  # Notifications
  flutter_local_notifications: ^17.1.2
  notification_listener_service: ^1.0.0

  # Background jobs
  workmanager: ^0.9.0+3

  # File picking (for timetable upload)
  file_picker: ^11.0.2
  image_picker: ^1.0.7

  # Permissions
  permission_handler: ^11.3.0
  app_usage: ^4.1.0

  # UI
  fl_chart: ^0.68.0
  flutter_markdown: ^0.7.3
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0

  # Speech to text (voice notes)
  speech_to_text: ^7.4.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Additions
  url_launcher: ^6.2.5
  flutter_inappwebview: ^6.0.0
  uuid: ^4.3.3
  geolocator: ^11.0.0

  http_parser: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/